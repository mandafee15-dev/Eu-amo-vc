     <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You - Spotify Style</title>
    <style>
        :root {
            --spotify-black: #121212;
            --spotify-dark-grey: #181818;
            --spotify-grey: #242424;
            --spotify-light-grey: #b3b3b3;
            --spotify-green: #1db954;
            --spotify-white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--spotify-black);
            color: var(--spotify-white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .player-container {
            background-color: var(--spotify-dark-grey);
            padding: 24px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .album-art {
            width: 100%;
            height: 320px;
            background: linear-gradient(135deg, #8e2de2, #4a00e0);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 60px rgba(0,0,0,0.5);
        }

        .album-art h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--spotify-white);
            animation: pulse 2s infinite alternate;
        }

        .album-art .heart {
            font-size: 3.5rem;
            color: #ff3366;
            margin-top: 10px;
            animation: beat 0.6s infinite alternate;
        }

        .track-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .track-details {
            max-width: 80%;
        }

        .track-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 5px 0;
        }

        .track-artist {
            font-size: 0.875rem;
            color: var(--spotify-light-grey);
            margin: 0;
        }

        .like-btn {
            background: none;
            border: none;
            color: var(--spotify-green);
            font-size: 1.25rem;
            cursor: pointer;
        }

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: var(--spotify-grey);
            border-radius: 2px;
            cursor: pointer;
        }

        .progress-current {
            height: 100%;
            width: 0%;
            background-color: var(--spotify-white);
            border-radius: 2px;
        }

        .progress-bar:hover .progress-current {
            background-color: var(--spotify-green);
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--spotify-light-grey);
            margin-top: 8px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--spotify-light-grey);
            font-size: 1.25rem;
            cursor: pointer;
        }

        .control-btn:hover {
            color: var(--spotify-white);
        }

        .play-btn {
            background-color: var(--spotify-white);
            color: var(--spotify-black);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            transition: transform 0.1s;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        @keyframes pulse {
            0% { transform: scale(0.98); }
            100% { transform: scale(1.02); }
        }

        @keyframes beat {
            to { transform: scale(1.15); }
        }
    </style>
</head>
<body>

    <audio id="musicTrack" src="musica.mp3"></audio>

    <div class="player-container">
        <div class="album-art">
            <h1>I Love You</h1>
            <div class="heart">❤️</div>
        </div>

        <div class="track-info">
            <div class="track-details">
                <p class="track-title">Raindance</p>
                <p class="track-artist">Dave</p>
            </div>
            <button class="like-btn">💚</button>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-current" id="progressCurrent"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="durationTime">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn">🔀</button>
            <button class="control-btn">⏮</button>
            <button class="control-btn play-btn" id="playBtn">▶</button>
            <button class="control-btn">⏭</button>
            <button class="control-btn">🔁</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('musicTrack');
        const playBtn = document.getElementById('playBtn');
        const progressCurrent = document.getElementById('progressCurrent');
        const currentTimeElem = document.getElementById('currentTime');
        const durationTimeElem = document.getElementById('durationTime');

        // Formata os segundos em formato MM:SS
        function formatTime(seconds) {
            let mins = Math.floor(seconds / 60);
            let secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // Carrega a duração total assim que o áudio estiver pronto
        audio.addEventListener('loadedmetadata', () => {
            durationTimeElem.textContent = formatTime(audio.duration);
        });

        // Controla o Play / Pause de verdade
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '⏸';
            } else {
                audio.pause();
                playBtn.textContent = '▶';
            }
        });

        // Atualiza a barra de progresso e o tempo rodando
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressCurrent.style.width = `${percent}%`;
            currentTimeElem.textContent = formatTime(audio.currentTime);
        });

        // Reseta o botão quando a música acabar
        audio.addEventListener('ended', () => {
            playBtn.textContent = '▶';
            progressCurrent.style.width = '0%';
            currentTimeElem.textContent = '0:00';
        });
    </script>
</body>
</html>
